name: Publish Package

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u pi-40 --password-stdin

      - name: Build Package Image
        run: |
          # Creates a lightweight container layout holding your project zip
          cat <<EOF > Dockerfile
          FROM scratch
          COPY . .
          EOF
          
          docker build -t ghcr.io/pi-40/shterm:1.0.0 .

      - name: Push to GitHub Packages
        run: docker push ghcr.io/pi-40/shterm:1.0.0
